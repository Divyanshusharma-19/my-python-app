<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DisasterGuard AI | 72hr Forecast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .hazard-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; transition: 0.3s; }
        .hazard-card:hover { transform: translateY(-5px); border-color: #38bdf8; }
        .status-high { color: #ef4444; font-weight: bold; text-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
        .status-normal { color: #10b981; }
        .header-bg { background: linear-gradient(90deg, #0ea5e9, #2563eb); padding: 40px 0; margin-bottom: 30px; border-radius: 0 0 30px 30px; }
    </style>
</head>
<body>
    <div class="header-bg text-center shadow">
        <h1>🛡️ DisasterGuard AI</h1>
        <p>Real-time Early Warning System • 72-Hour Prediction Window</p>
    </div>

    <div class="container">
        <div class="row g-4" id="dashboard">
            <div class="text-center"><h4>⏳ Loading live satellite & sensor data...</h4></div>
        </div>
    </div>

    <script>
        async function loadForecast() {
            const res = await fetch('/predict');
            const data = await res.json();
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = '';

            for (const [key, val] of Object.entries(data.forecast)) {
                const isHigh = val.alert_level.includes('HIGH');
                dashboard.innerHTML += `
                    <div class="col-md-6 col-lg-3">
                        <div class="hazard-card p-4 h-100 shadow-sm">
                            <h5 class="text-uppercase text-secondary">${key}</h5>
                            <h2 class="${isHigh ? 'status-high' : 'status-normal'}">${val.probability}</h2>
                            <p class="mb-1">${val.alert_level}</p>
                            <hr class="border-secondary">
                            <small class="text-info">${val.advisory}</small>
                        </div>
                    </div>
                `;
            }
        }
        loadForecast();
    </script>
</body>
</html>
