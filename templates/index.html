<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DisasterGuard AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero { background: linear-gradient(135deg, #1e40af 0%, #1e293b 100%); padding: 60px 0; text-align: center; border-bottom: 1px solid #334155; }
        .search-box { max-width: 600px; margin: -30px auto 30px; background: white; padding: 10px; border-radius: 50px; display: flex; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .search-box input { border: none; outline: none; padding: 10px 25px; flex-grow: 1; border-radius: 50px; font-size: 18px; color: #333; }
        .search-box button { background: #10b981; color: white; border: none; padding: 10px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .search-box button:hover { background: #059669; }
        .hazard-card { background: #1e293b; padding: 25px; border-radius: 20px; border: 1px solid #334155; height: 100%; transition: 0.3s; }
        .hazard-card:hover { transform: translateY(-5px); border-color: #38bdf8; }
        .alert-red { color: #ef4444; font-weight: bold; }
        .alert-green { color: #10b981; font-weight: bold; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>🛡️ DisasterGuard AI</h1>
        <p class="text-blue-200">Real-time 72-hour risk analysis for global locations</p>
    </div>

    <div class="container">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name (e.g. Punjab, Patna)...">
            <button onclick="getPrediction()">PREDICT</button>
        </div>

        <div class="text-center mb-5">
            <h3 id="locName" style="color: #38bdf8;">Global Station</h3>
        </div>

        <div id="results" class="row g-4">
            </div>
    </div>

    <script>
        async function getPrediction() {
            const city = document.getElementById('cityInput').value;
            if(!city) return alert("Please enter a location");
            
            document.getElementById('results').innerHTML = '<div class="text-center w-100">📡 Accessing satellite data...</div>';
            
            try {
                const res = await fetch('/predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ location: city })
                });
                
                const data = await res.json();
                document.getElementById('locName').innerText = "Location Analysis: " + data.location;
                
                const dashboard = document.getElementById('results');
                dashboard.innerHTML = ''; 

                data.forecast.forEach(item => {
                    const isHigh = item.level.includes('HIGH');
                    dashboard.innerHTML += `
                        <div class="col-md-6">
                            <div class="hazard-card">
                                <h6 class="text-uppercase" style="color: #94a3b8; letter-spacing: 1px;">${item.type}</h6>
                                <h2 style="color: ${isHigh ? '#ef4444' : '#10b981'}; font-size: 48px;">${item.prob}</h2>
                                <div class="mb-2" style="font-size: 18px; color: white;">${item.level}</div>
                                <p style="color: #38bdf8; margin: 0;">${item.msg}</p>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                document.getElementById('results').innerHTML = '<div class="text-danger">Error connecting to AI Server.</div>';
            }
        }
    </script>
</body>
</html>
